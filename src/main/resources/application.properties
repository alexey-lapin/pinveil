micronaut.application.name=pinveil
micronaut.router.static-resources.default.enabled=true
micronaut.router.static-resources.default.mapping=/static/**
micronaut.router.static-resources.default.paths=classpath:static
micronaut.server.multipart.max-file-size=25MB
micronaut.server.max-request-size=27MB

app.messages.min-ttl=1m
app.messages.max-ttl=24h
app.messages.default-ttl=15m
app.messages.ttl-presets[0]=15m
app.messages.ttl-presets[1]=30m
app.messages.ttl-presets[2]=1h
app.messages.max-payload-bytes=26214400
app.messages.max-failed-pin-attempts=3
app.messages.max-stored-messages=1000
app.messages.max-stored-bytes=268435456
app.messages.pbkdf2-iterations=600000
app.messages.pin-pepper=

app.rate-limit.window=1m
app.rate-limit.create-requests-per-window=10
app.rate-limit.retrieve-requests-per-window=30
